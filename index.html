.tp-panel{position:fixed;top:12px;right:12px;z-index:9999;background:white;
 border:1px solid #999;border-radius:6px;font:13px sans-serif;box-shadow:0 1px 5px rgba(0,0,0,.3);
 max-height:88vh;overflow-y:auto;min-width:188px;max-width:248px}
.tp-panel .tp-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
 padding:8px 11px;cursor:pointer;position:sticky;top:0;background:white;border-radius:6px 6px 0 0}
.tp-panel .tp-title{font-weight:bold}
.tp-panel .tp-toggle{border:none;background:none;font-size:15px;line-height:1;cursor:pointer;
 padding:0 2px;color:#555}
.tp-panel .tp-body{padding:0 11px 9px}
.tp-panel.tp-collapsed{max-height:none;overflow:visible}
.tp-panel.tp-collapsed .tp-head{border-radius:6px}
.tp-panel.tp-collapsed .tp-body{display:none}
.tp-panel hr{margin:7px 0;border:none;border-top:1px solid #ddd}
.tp-panel .hd{font-weight:bold;margin:2px 0 3px}
.tp-panel select{width:100%;margin-bottom:4px}
.tp-panel .tp-timelabel{display:block;font-size:12px;margin-top:4px}
.tp-panel #isoTimeLabel{font-weight:bold}
.tp-panel .tp-sliderrow{display:flex;align-items:center;gap:6px}
.tp-panel .tp-slider{flex:1;min-width:0;margin:3px 0 1px}
.tp-panel .tp-step{flex:0 0 auto;width:28px;height:28px;border:1px solid #bbb;border-radius:5px;
 background:#f6f6f6;color:#333;font-size:16px;line-height:1;cursor:pointer;padding:0}
.tp-panel .tp-step:hover{background:#ececec}
.tp-panel .tp-step:active{background:#e0e0e0}
.tp-panel .tp-slmarks{display:flex;justify-content:space-between;font-size:10px;color:#777;padding:0 34px}
.tp-panel .tp-show{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:6px}
.tp-panel .lrow{display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.55}
.tp-panel .sw{width:16px;height:12px;display:inline-block;border:1px solid #555;flex:0 0 auto}
@media (max-width:600px){
 .tp-panel{top:8px;right:8px;max-height:60vh;max-width:74vw;font-size:12px}
 .tp-panel .tp-title{font-size:13px}
}
</style>

var current = null, reqId = 0;

function fmt12(hhmm){
  var h = parseInt(hhmm.slice(0,2),10), mm = hhmm.slice(2);
  var ap = h < 12 ? 'AM' : 'PM', h12 = (h % 12) || 12;
  return h12 + ':' + mm + ' ' + ap;

function curTimes(){ return DAY_TIMES[daySel.value] || []; }

}
function clearIso(){ if (current){ MAP.removeLayer(current); current = null; } }
function loadIso(){
  if (!showChk.checked) return;
  var hhmm = curTimes()[+slider.value];
  if (!hhmm) return;
  var url = ISO_DIR + DAY_DATE[daySel.value] + '_' + hhmm + '.geojson';
